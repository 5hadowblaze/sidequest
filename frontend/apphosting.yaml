# Firebase App Hosting config for the Next.js frontend (frontend/).
# Set BACKEND_URL to your Cloud Run URL before deploying — see README.md.

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80

env:
  # Python FastAPI backend (Cloud Run) — updated after backend deploy
  - variable: BACKEND_URL
    value: https://weekend-api-1078602360488.us-central1.run.app
    availability:
      - RUNTIME
  - variable: SKIP_MPP
    value: "true"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SKIP_MPP
    value: "true"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ENABLE_DEMO
    value: "true"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDyGpExPO2scF3aMztRB05WQh_IDlftZkQ
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: perfect-weekend-planner.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: perfect-weekend-planner
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: perfect-weekend-planner.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1078602360488"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:1078602360488:web:116bf6e78076cc582a449d
    availability:
      - BUILD
      - RUNTIME
