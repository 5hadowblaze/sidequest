name: WeekendExplorer
options:
  bundleIdPrefix: com.perfectweekendplanner
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    OTHER_LDFLAGS:
      - -ObjC

targets:
  WeekendExplorer:
    type: application
    platform: iOS
    sources:
      - WeekendExplorer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.perfectweekendplanner.explorer
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: WeekendExplorer/Resources/Info.plist
      properties:
        BACKEND_URL: "$(BACKEND_URL)"
        NSCalendarsUsageDescription: "Sidequest reads your calendar to find free weekend slots for planning."
        NSCalendarsFullAccessUsageDescription: "Sidequest reads your calendar to find free weekend slots for planning."
        NSLocationWhenInUseUsageDescription: "Sidequest uses your location to show nearby events on the map."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - com.googleusercontent.apps.PLACEHOLDER
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseCore
      - package: GoogleSignIn
        product: GoogleSignIn

  WeekendExplorerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WeekendExplorerTests
    dependencies:
      - target: WeekendExplorer
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true

  WeekendExplorerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - WeekendExplorerUITests
    dependencies:
      - target: WeekendExplorer
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true

schemes:
  WeekendExplorer:
    build:
      targets:
        WeekendExplorer: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WeekendExplorerTests
        - WeekendExplorerUITests
    archive:
      config: Release

  WeekendExplorerTests:
    build:
      targets:
        WeekendExplorer: all
        WeekendExplorerTests: [test]
    test:
      config: Debug
      targets:
        - WeekendExplorerTests
